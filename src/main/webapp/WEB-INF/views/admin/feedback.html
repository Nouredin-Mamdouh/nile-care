<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">

<head>
    <title>Feedback Management</title>
    <style>
        /* Card Component Styling */
        .card-custom {
            background-color: white;
            border: 1px solid #dbeafe;
            border-radius: 0.75rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.2s;
        }

        .card-custom:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Icon Box Gradients - Dashboard Style */
        .icon-box {
            width: 3rem;
            height: 3rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .bg-gradient-blue {
            background: linear-gradient(to bottom right, #3b82f6, #2563eb);
        }

        .bg-gradient-yellow {
            background: linear-gradient(to bottom right, #f59e0b, #d97706);
        }

        .bg-gradient-orange {
            background: linear-gradient(to bottom right, #f97316, #ea580c);
        }

        /* Star Rating */
        .star-rating {
            display: inline-flex;
            gap: 0.25rem;
            font-size: 1.125rem;
        }

        .star-active {
            color: #fbbf24; /* Gold */
        }

        .star-inactive {
            color: #d1d5db; /* Gray */
        }

        /* Pill Button Style */
        .btn-pill {
            border-radius: 50rem;
            padding: 0.5rem 1rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary-pill {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            border: none;
            color: white;
        }

        .btn-primary-pill:hover {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Badge Styles */
        .badge-category {
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        /* Feedback Card */
        .feedback-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }

        .feedback-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .feedback-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #6b7280;
            font-size: 0.875rem;
            flex-wrap: wrap;
        }

        .feedback-message {
            color: #374151;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .feedback-response {
            background: #f0f9ff;
            border-left: 3px solid #3b82f6;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }

        /* Text Colors */
        .text-blue-900 {
            color: #1e3a8a;
        }

        .text-blue-600 {
            color: #2563eb;
        }

        .text-gray-600 {
            color: #4b5563;
        }

        .text-gray-700 {
            color: #374151;
        }

        /* Modal Enhancements */
        .modal-header {
            border-bottom: 1px solid #e5e7eb;
        }

        .modal-footer {
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">

        <!-- Page Header -->
        <div class="mb-4">
            <h1 class="text-blue-900 mb-2 fw-bold" style="font-size: 2rem;">Feedback Management</h1>
            <p class="text-blue-600">Review and respond to student feedback</p>
        </div>

        <!-- Stats Grid - Dashboard Style -->
        <div class="row g-4 mb-4">
            <!-- Total Feedback Card -->
            <div class="col-12 col-md-4">
                <div class="card card-custom border-0">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="icon-box bg-gradient-blue">
                                <i class="fas fa-comments fa-lg"></i>
                            </div>
                            <div class="text-end">
                                <p class="text-blue-600 small mb-1">Total Feedback</p>
                                <h2 class="text-blue-900 fw-bold mb-0" style="font-size: 1.25rem;" id="totalFeedbackCount">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Average Rating Card -->
            <div class="col-12 col-md-4">
                <div class="card card-custom border-0">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="icon-box bg-gradient-yellow">
                                <i class="fas fa-star fa-lg"></i>
                            </div>
                            <div class="text-end">
                                <p class="text-blue-600 small mb-1">Average Rating</p>
                                <h2 class="text-blue-900 fw-bold mb-0" style="font-size: 1.25rem;" id="averageRating">0.0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Reviews Card -->
            <div class="col-12 col-md-4">
                <div class="card card-custom border-0">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="icon-box bg-gradient-orange">
                                <i class="fas fa-clock fa-lg"></i>
                            </div>
                            <div class="text-end">
                                <p class="text-blue-600 small mb-1">Pending Reviews</p>
                                <h2 class="text-blue-900 fw-bold mb-0" style="font-size: 1.25rem;" id="pendingCount">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Feedback List -->
        <div class="card card-custom border-0">
            <div class="card-body p-4">
                <h5 class="text-blue-900 fw-bold mb-4">Student Feedback</h5>
                <div id="feedbackList">
                    <!-- Feedback items will be dynamically inserted here -->
                </div>
                <div id="emptyState" class="text-center py-5" style="display: none;">
                    <i class="fas fa-inbox fa-3x text-secondary mb-3"></i>
                    <p class="text-gray-600">No feedback received yet</p>
                </div>
            </div>
        </div>

        <!-- Reply Modal -->
        <div class="modal fade" id="replyModal" tabindex="-1" aria-labelledby="replyModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title text-blue-900 fw-bold" id="replyModalLabel">Reply to Feedback</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-gray-700">Student</label>
                            <p class="text-gray-600" id="modalStudentName"></p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-gray-700">Original Message</label>
                            <p class="text-gray-600" id="modalMessage"></p>
                        </div>
                        <div class="mb-3">
                            <label for="replyText" class="form-label fw-semibold text-gray-700">Your Response</label>
                            <textarea class="form-control" id="replyText" rows="5" placeholder="Type your response here..." required></textarea>
                            <div class="invalid-feedback">Please enter a response</div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary rounded-pill px-4 py-2" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary-pill px-4 py-2" id="sendReplyBtn">Send Reply</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script layout:fragment="scripts">
        // Import toast notifications library
        if (typeof ToastNotifications === 'undefined') {
            console.warn('ToastNotifications library not loaded. Ensure toast-notifications.js is included.');
        }

        let feedbackData = [];
        let currentFeedbackId = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            fetchFeedback();
        });

        // Fetch all feedback from API
        function fetchFeedback() {
            showLoading();
            
            fetch('/api/admin/feedback', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(feedbackList => {
                hideLoading();
                
                feedbackData = feedbackList;
                console.log('Fetched feedback:', feedbackData);
                
                updateStatistics();
                renderFeedbackList();
            })
            .catch(error => {
                hideLoading();
                console.error('Error fetching feedback:', error);
                showError('Error loading feedback');
            });
        }

        // Update statistics cards
        function updateStatistics() {
            const totalCount = feedbackData.length;
            const pendingCount = feedbackData.filter(f => f.status === 'pending' || f.status === 'reviewed').length;
            
            // Calculate average rating
            let avgRating = 0;
            if (totalCount > 0) {
                const totalRating = feedbackData.reduce((sum, f) => sum + f.rating, 0);
                avgRating = (totalRating / totalCount).toFixed(1);
            }

            document.getElementById('totalFeedbackCount').textContent = totalCount;
            document.getElementById('averageRating').textContent = avgRating;
            document.getElementById('pendingCount').textContent = pendingCount;
        }

        // Render feedback list
        function renderFeedbackList() {
            const listContainer = document.getElementById('feedbackList');
            const emptyState = document.getElementById('emptyState');

            if (feedbackData.length === 0) {
                listContainer.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            listContainer.innerHTML = feedbackData.map(feedback => `
                <div class="feedback-card">
                    <div class="feedback-header">
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            ${renderStars(feedback.rating)}
                            <span class="badge badge-category bg-primary-subtle text-primary">${feedback.category}</span>
                        </div>
                        <span class="badge ${getStatusBadgeClass(feedback.status)}">${capitalizeFirst(feedback.status)}</span>
                    </div>
                    
                    <div class="feedback-meta">
                        <span><i class="fas fa-user me-2"></i>${feedback.studentName}</span>
                        <span><i class="fas fa-calendar me-2"></i>${feedback.date}</span>
                    </div>
                    
                    <h6 class="text-gray-700 fw-semibold mt-3 mb-2">${feedback.subject}</h6>
                    <p class="feedback-message">${feedback.message}</p>
                    
                    ${feedback.response ? `
                        <div class="feedback-response">
                            <p class="small text-blue-600 fw-semibold mb-2"><i class="fas fa-reply me-2"></i>Admin Response</p>
                            <p class="mb-0 text-gray-700">${feedback.response}</p>
                        </div>
                    ` : ''}
                    
                    ${!feedback.response ? `
                        <button class="btn btn-primary-pill px-4 py-2 mt-2" onclick="openReplyModal(${feedback.id}, '${escapeHtml(feedback.studentName)}', '${escapeHtml(feedback.message)}')">
                            <i class="fas fa-reply me-2"></i>Reply
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }

        // Render star rating
        function renderStars(rating) {
            let stars = '<div class="star-rating">';
            for (let i = 1; i <= 5; i++) {
                stars += `<i class="fas fa-star ${i <= rating ? 'star-active' : 'star-inactive'}"></i>`;
            }
            stars += '</div>';
            return stars;
        }

        // Get status badge class
        function getStatusBadgeClass(status) {
            switch(status.toLowerCase()) {
                case 'pending':
                case 'reviewed':
                    return 'bg-warning text-dark';
                case 'responded':
                    return 'bg-success-subtle text-success';
                default:
                    return 'bg-secondary';
            }
        }

        // Capitalize first letter
        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Open reply modal
        function openReplyModal(feedbackId, studentName, message) {
            currentFeedbackId = feedbackId;
            document.getElementById('modalStudentName').textContent = studentName;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('replyText').value = '';
            document.getElementById('replyText').classList.remove('is-invalid');
            
            const modal = new bootstrap.Modal(document.getElementById('replyModal'));
            modal.show();
        }

        // Setup reply button
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('sendReplyBtn').addEventListener('click', function() {
                const replyText = document.getElementById('replyText').value.trim();
                const replyInput = document.getElementById('replyText');
                
                if (!replyText) {
                    replyInput.classList.add('is-invalid');
                    ToastNotifications.showErrorAlert('Please enter a response message.', 'warning');
                    return;
                }
                
                replyInput.classList.remove('is-invalid');
                sendReply(currentFeedbackId, replyText);
            });
        });

        // Send reply to API
        function sendReply(feedbackId, replyText) {
            showLoading();

            fetch(`/api/admin/feedback/${feedbackId}/reply`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ response: replyText })
            })
            .then(response => response.json())
            .then(result => {
                hideLoading();

                if (result.success) {
                    // Close modal
                    const modal = bootstrap.Modal.getInstance(document.getElementById('replyModal'));
                    modal.hide();
                    
                    // Show success message
                    ToastNotifications.showSuccessToast('Reply sent successfully!');
                    
                    // Reload feedback
                    fetchFeedback();
                } else {
                    ToastNotifications.showErrorAlert('Failed to send reply: ' + (result.message || 'Unknown error'), 'danger');
                }
            })
            .catch(error => {
                hideLoading();
                console.error('Error sending reply:', error);
                ToastNotifications.showErrorAlert('Failed to send reply. Please try again.', 'danger');
            });
        }

        // Utility functions
        function showLoading() {
            document.getElementById('feedbackList').innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>`;
        }

        function hideLoading() {
            // Inline spinner will be replaced by renderFeedbackList() output
        }

        function showError(message) {
            if (typeof ToastNotifications !== 'undefined') {
                ToastNotifications.showErrorAlert(message, 'danger');
            } else {
                alert(message);
            }
        }
    </script>
</body>

</html>
