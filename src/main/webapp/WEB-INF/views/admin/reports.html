<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">

<head>
    <title>Reports - MindCare</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Card Component Styling */
        .card-custom {
            background-color: white;
            border: 1px solid #dbeafe;
            /* border-blue-100 */
            border-radius: 0.75rem;
            /* rounded-xl */
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            /* shadow-md */
            transition: box-shadow 0.2s;
        }

        .card-custom:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            /* shadow-lg */
        }

        /* Gradient Buttons */
        .btn-gradient-primary {
            background: linear-gradient(to right, #3b82f6, #22c55e);
            border: none;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-gradient-primary:hover {
            background: linear-gradient(to right, #2563eb, #16a34a);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-outline-custom {
            border: 1px solid #dbeafe;
            color: #2563eb;
            background-color: white;
            transition: all 0.2s;
        }

        .btn-outline-custom:hover {
            background-color: #eff6ff;
            border-color: #93c5fd;
            color: #1d4ed8;
        }

        /* Text Colors */
        .text-blue-900 {
            color: #1e3a8a;
        }

        .text-blue-600 {
            color: #2563eb;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 class="text-blue-900 mb-2 fw-bold" style="font-size: 2rem;">Analytics & Reports</h1>
                <p class="text-blue-600">System performance and engagement metrics</p>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-custom d-flex align-items-center gap-2">
                    <i class="fas fa-download"></i>
                    CSV
                </button>
                <button class="btn btn-gradient-primary d-flex align-items-center gap-2">
                    <i class="fas fa-file-pdf"></i>
                    PDF Report
                </button>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4">
            <!-- User Growth Trends Chart -->
            <div class="col-12 col-lg-8">
                <div class="card card-custom border-0 h-100">
                    <div class="card-header bg-white border-0 pt-4">
                        <h5 class="text-blue-900 fw-bold mb-0">User Growth Trends</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="growthChart" height="120"></canvas>
                    </div>
                </div>
            </div>

            <!-- Module Engagement Chart -->
            <div class="col-12 col-lg-4">
                <div class="card card-custom border-0 h-100">
                    <div class="card-header bg-white border-0 pt-4">
                        <h5 class="text-blue-900 fw-bold mb-0">Module Engagement</h5>
                    </div>
                    <div class="card-body d-flex align-items-center justify-content-center">
                        <canvas id="engagementChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // 1. User Growth Chart (Line/Area)
            const ctx1 = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
                    datasets: [{
                        label: 'Total Users',
                        data: [120, 190, 261, 332, 432, 593, 764],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 5,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#1e3a8a',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 13
                            },
                            borderColor: '#3b82f6',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#f3f4f6',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#6b7280',
                                font: {
                                    size: 12
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                color: '#6b7280',
                                font: {
                                    size: 12
                                }
                            }
                        }
                    }
                }
            });

            // 2. Module Engagement (Doughnut)
            const ctx2 = document.getElementById('engagementChart').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'In Progress', 'Not Started'],
                    datasets: [{
                        data: [450, 200, 100],
                        backgroundColor: ['#22c55e', '#3b82f6', '#e5e7eb'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    size: 13,
                                    weight: '500'
                                },
                                color: '#1e3a8a',
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1e3a8a',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: {
                                size: 13
                            },
                            borderColor: '#3b82f6',
                            borderWidth: 1,
                            callbacks: {
                                label: function (context) {
                                    let label = context.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = Math.round((context.parsed / total) * 100);
                                    label += context.parsed + ' (' + percentage + '%)';
                                    return label;
                                }
                            }
                        }
                    },
                    cutout: '65%'
                }
            });
        </script>

    </div>
</body>

</html>
