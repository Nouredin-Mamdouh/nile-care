<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">

<head>
    <title>Book Counseling</title>
    <!-- Bootstrap Datepicker CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
</head>

<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-2" style="color: #1e3a8a;">Counseling Appointments</h1>
                <p style="color: #2563eb;">Book a session with our professional counselors</p>
            </div>
            <button class="btn text-white fw-semibold d-flex align-items-center gap-2"
                style="background: linear-gradient(to right, #3b82f6, #22c55e);" data-bs-toggle="modal"
                data-bs-target="#bookingModal">
                <i class="fas fa-calendar-plus"></i> Book Appointment
            </button>
        </div>

        <!-- Date and Time Selection -->
        <div class="row g-4 mb-4">
            <!-- Calendar -->
            <div class="col-lg-8">
                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-3" style="color: #1e3a8a;">Select Date</h5>
                    <div id="datepicker-container" class="d-flex justify-content-center"></div>
                </div>
            </div>

            <!-- Available Time Slots -->
            <div class="col-lg-4">
                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-3" style="color: #1e3a8a;">Available Time Slots</h5>
                    <div id="selected-date-display" class="mb-3 text-muted small">
                        Please select a date
                    </div>
                    <div id="time-slots-container">
                        <!-- Time slots will be rendered here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Our Counselors -->
        <div class="card card-custom p-4 mb-4">
            <h5 class="fw-bold mb-3" style="color: #1e3a8a;">Our Counselors</h5>
            <div class="row g-4" id="counselors-container">
                <!-- Counselor cards will be rendered here -->
            </div>
        </div>

        <!-- Your Appointments -->
        <div class="card card-custom p-4">
            <h5 class="fw-bold mb-3" style="color: #1e3a8a;">Your Appointments</h5>
            <div id="appointments-container">
                <!-- Appointments will be rendered here -->
            </div>
        </div>

        <!-- Booking Modal -->
        <div class="modal fade" id="bookingModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="border-radius: 16px; border: none;">
                    <div class="modal-header border-bottom">
                        <h5 class="modal-title fw-bold" style="color: #1e3a8a;">Book Counseling Appointment</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div id="booking-summary">
                            <!-- Booking summary will be rendered here -->
                        </div>
                    </div>
                    <div class="modal-footer border-top">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn text-white"
                            style="background: linear-gradient(to right, #3b82f6, #22c55e);" onclick="confirmBooking()">
                            Confirm Booking
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <!-- Bootstrap Datepicker JS -->
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
        <script th:src="@{/static/js/counseling.js}"></script>
    </th:block>
</body>

</html>
